; GottFA80 PLuS — ESP32-S3 companion firmware
; Pstore Pinball Platform — "ESP32 bridge"
[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; --- ESP32-S3 N16R8: 16 MB QIO flash + 8 MB OPI (octal) PSRAM ---
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=3 -DBOARD_HAS_PSRAM
board_build.filesystem = littlefs
lib_deps =
  https://github.com/ESP32Async/AsyncTCP.git
  https://github.com/ESP32Async/ESPAsyncWebServer.git
  bblanchon/ArduinoJson@^7
  adafruit/Adafruit SSD1306@^2.5
  adafruit/Adafruit GFX Library@^1.11
; Flashing/monitoring through the S3 *native USB* port (not the UART bridge)?
; Append:  -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1
; Upload the web UI (data/) to LittleFS:  pio run -t uploadfs

; Smaller/cheaper alternative target. Build: pio run -e esp32c3
[env:esp32c3]
extends = env:esp32s3
board = esp32-c3-devkitm-1
build_flags = -DCORE_DEBUG_LEVEL=3 -DBOARD_C3
; C3 = 4 MB QSPI flash, no PSRAM — override the N16R8 memory settings inherited via extends
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default.csv

; --- Ralf's GOSOWAV board (ESP32-WROVER + MCP4921 SPI DAC + 4-bit SDMMC) -------------------------
; Minimal PSOROM bench: runs OUR 6502 emulator on real hardware, streams the emulated 80B DAC to the
; MCP4921, prints the real 6502-cycles/sec throughput. 100% our code (PD Fake6502); nothing reused
; from PWAVplayer. Build: pio run -e gosowav  -> flash, put /yrom1.snd + /drom1.snd on the SD, open
; serial @115200. build_src_filter compiles ONLY the bench + emulator (not the S3 app).
[env:gosowav]
platform = espressif32
board = esp-wrover-kit
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = -DGOSOWAV_BENCH -DCORE_DEBUG_LEVEL=3 -DBOARD_HAS_PSRAM
build_src_filter = -<*> +<gosowav_psorom.cpp> +<psorom.cpp> +<fake6502.c> +<emu2149.c> +<sp0250.cpp>

; Bisect-only: bare SoftAP + WebServer (no SD, no emulator). Proves the WROVER web stack in
; isolation -> separates "firmware blocked in setup()" from "board/client" faults.
; Build: pio run -e gosowav_diag -t upload   ->  join 'GOSOWAV-DIAG', open http://192.168.4.1/
[env:gosowav_diag]
extends = env:gosowav
build_flags = -DGOSOWAV_DIAG -DCORE_DEBUG_LEVEL=3
build_src_filter = -<*> +<gosowav_diag.cpp>
